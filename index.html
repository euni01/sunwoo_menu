<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>선우 메뉴</title>

<style>
body{
margin:0;
padding:0;
background:#f5f5f5;
font-family:sans-serif;
}

.wrap{
width:966px;
margin:0 auto;
padding-top:40px;
}

.menu{
display:flex;
justify-content:center;
gap:60px;
margin-bottom:30px;
font-weight:bold;
}

.menu a{
text-decoration:none;
color:#222;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
grid-template-rows:350px 170px;
gap:10px;
}

.box{
background-size:cover;
background-position:center;
border-radius:4px;
overflow:hidden;
}

.big{
grid-row:1 / 3;
}

.small-wrap{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
}

.icon{
background:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:bold;
border-radius:4px;
text-decoration:none;
color:#222;
}
</style>
</head>

<body>

<div class="wrap">

<div class="menu">
<a href="#">카테고리 1</a>
<a href="#">카테고리 2</a>
<a href="#">카테고리 2</a>
<a href="#">카테고리 3</a>
<a href="#">카테고리 4</a>
</div>

<div class="grid">

<div class="box big"
style="background-image:url('https://picsum.photos/600/800');">
</div>

<div class="box"
style="background-image:url('https://picsum.photos/500/300');">
</div>

<div class="small-wrap">

<a class="icon" href="https://open.kakao.com/" target="_blank">
KAKAO
</a>

<a class="icon" href="https://instagram.com/" target="_blank">
INSTAGRAM
</a>

<a class="icon" href="tel:01012341234">
CALL
</a>

</div>

</div>

</div>

</body>
</html>
